<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senda — Platform of Writings & Feedback</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex flex-col antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-40 w-full glass-card border-b border-gray-800/40 bg-gray-950/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
      <div class="flex items-center gap-2 cursor-pointer" onclick="app.resetFeed()">
        <span class="bg-gradient-to-r from-blue-500 to-purple-600 p-2 rounded-xl text-white shadow-lg shadow-blue-500/20">
          <i class="fa-solid fa-feather-pointed text-xl"></i>
        </span>
        <span class="text-2xl font-bold tracking-wider bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">
          SENDA
        </span>
      </div>

      <!-- Search Bar -->
      <div class="flex-1 max-w-md relative hidden sm:block">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 pointer-events-none">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input 
          id="search-input"
          type="text" 
          placeholder="Buscar escritos por título, contenido o etiqueta..." 
          class="w-full pl-10 pr-4 py-2 rounded-xl bg-gray-900/60 border border-gray-800 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-200 text-sm"
          onkeyup="app.handleSearch(event)"
        >
      </div>

      <!-- Auth Section -->
      <div id="auth-container" class="flex items-center gap-3">
        <!-- Will be populated dynamically -->
        <button onclick="app.openLoginModal()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm transition duration-200 shadow-md shadow-blue-600/10">
          <i class="fa-solid fa-right-to-bracket"></i>
          Ingresar
        </button>
      </div>
    </div>
    <!-- Mobile Search bar -->
    <div class="px-4 py-2 border-t border-gray-800/40 sm:hidden">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 pointer-events-none">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input 
          id="search-input-mobile"
          type="text" 
          placeholder="Buscar escritos..." 
          class="w-full pl-10 pr-4 py-2 rounded-xl bg-gray-900/60 border border-gray-800 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-200 text-sm"
          onkeyup="app.handleSearch(event)"
        >
      </div>
    </div>
  </header>

  <!-- Main layout -->
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
    
    <!-- Admin Controls Panel (Left side, only if admin) -->
    <div id="admin-panel" class="w-full lg:w-80 shrink-0 hidden flex flex-col gap-6">
      <div class="glass-card p-6 rounded-2xl border border-gray-800/50 flex flex-col gap-5">
        <div class="flex items-center justify-between border-b border-gray-800/60 pb-3">
          <h3 class="text-lg font-semibold text-gray-100 flex items-center gap-2">
            <i class="fa-solid fa-pen-fancy text-blue-500"></i>
            <span id="editor-title">Nuevo Escrito</span>
          </h3>
          <button id="cancel-edit-btn" onclick="app.cancelEdit()" class="text-xs text-gray-500 hover:text-gray-300 hidden">
            Cancelar
          </button>
        </div>

        <form id="writing-form" onsubmit="app.saveWriting(event)" class="flex flex-col gap-4">
          <input type="hidden" id="writing-id">
          
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Título</label>
            <input 
              id="w-title" 
              type="text" 
              required 
              placeholder="Un título inspirador..." 
              class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-800 text-gray-200 focus:outline-none focus:border-blue-500 text-sm"
            >
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Contenido (Markdown)</label>
            <textarea 
              id="w-content" 
              required 
              rows="8"
              placeholder="Escribe tu obra aquí usando Markdown..." 
              class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-800 text-gray-200 focus:outline-none focus:border-blue-500 text-sm font-mono"
            ></textarea>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Etiquetas (separadas por comas)</label>
            <input 
              id="w-tags" 
              type="text" 
              placeholder="poesia, amor, reflexiones" 
              class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-800 text-gray-200 focus:outline-none focus:border-blue-500 text-sm"
            >
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Estado</label>
            <select 
              id="w-status" 
              class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-800 text-gray-200 focus:outline-none focus:border-blue-500 text-sm"
            >
              <option value="borrador">Borrador</option>
              <option value="publicado">Publicado</option>
            </select>
          </div>

          <button type="submit" class="w-full py-2.5 px-4 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm transition duration-200 shadow-lg shadow-blue-600/10 mt-2 flex items-center justify-center gap-2">
            <i class="fa-solid fa-floppy-disk"></i>
            Guardar Escrito
          </button>
        </form>
      </div>
    </div>

    <!-- Content Feed Area (Center/Right) -->
    <div class="flex-1 flex flex-col gap-6">
      <div class="flex items-center justify-between border-b border-gray-800 pb-3">
        <h2 class="text-xl font-bold text-gray-100 flex items-center gap-2">
          <i class="fa-solid fa-list-check text-purple-500"></i>
          <span id="feed-title">Escritos Públicos</span>
        </h2>
        <div id="feed-filter-bar" class="flex gap-2 text-xs">
          <!-- Status selector for admins to see drafts -->
          <button id="filter-all" onclick="app.changeFeedFilter('')" class="px-3 py-1.5 rounded-lg bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-200 transition">Todos</button>
          <button id="filter-publicados" onclick="app.changeFeedFilter('publicado')" class="px-3 py-1.5 rounded-lg bg-blue-600 text-white shadow shadow-blue-500/10 transition">Publicados</button>
          <button id="filter-borradores" onclick="app.changeFeedFilter('borrador')" class="px-3 py-1.5 rounded-lg bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-200 transition hidden">Borradores</button>
        </div>
      </div>

      <!-- Feed Container -->
      <div id="feed-container" class="flex flex-col gap-6">
        <!-- Loading spinner -->
        <div class="flex flex-col items-center justify-center py-20 text-gray-500 gap-3">
          <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i>
          <span>Cargando escritos...</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Developer/Mock Login Modal -->
  <div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-950/80 backdrop-blur-sm hidden">
    <div class="w-full max-w-md mx-4 glass-card p-6 rounded-2xl border border-gray-800/60 relative">
      <button onclick="app.closeLoginModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-300">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>

      <div class="text-center mb-6">
        <span class="inline-flex bg-blue-500/10 p-3 rounded-2xl text-blue-400 mb-2">
          <i class="fa-solid fa-user-shield text-2xl"></i>
        </span>
        <h3 class="text-xl font-bold text-gray-100">Developer/Mock Login</h3>
        <p class="text-xs text-gray-500 mt-1">Acceso rápido para probar los diferentes roles de Senda</p>
      </div>

      <form onsubmit="app.handleLogin(event)" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Correo Electrónico</label>
          <input 
            id="login-email" 
            type="email" 
            required 
            value="writer@example.com"
            class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-800 text-gray-200 focus:outline-none focus:border-blue-500 text-sm"
          >
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Rol de Acceso</label>
          <div class="grid grid-cols-2 gap-3 mt-1">
            <label class="flex items-center gap-2 p-3 rounded-xl border border-gray-800 bg-gray-900/40 cursor-pointer hover:border-blue-500/50 transition">
              <input type="radio" name="login-role" value="admin" checked class="text-blue-500 focus:ring-0">
              <div class="flex flex-col">
                <span class="text-sm font-semibold text-gray-200">Administrador</span>
                <span class="text-[10px] text-gray-500">Escritor Principal</span>
              </div>
            </label>
            <label class="flex items-center gap-2 p-3 rounded-xl border border-gray-800 bg-gray-900/40 cursor-pointer hover:border-blue-500/50 transition">
              <input type="radio" name="login-role" value="lector" class="text-blue-500 focus:ring-0">
              <div class="flex flex-col">
                <span class="text-sm font-semibold text-gray-200">Lector</span>
                <span class="text-[10px] text-gray-500">Comentar y Valorar</span>
              </div>
            </label>
          </div>
        </div>

        <button type="submit" class="w-full py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm transition duration-200 mt-2 shadow-lg shadow-blue-600/10">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>

  <!-- Marked.js CDN to parse Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Client JavaScript -->
  <script src="app.js"></script>
</body>
</html>
